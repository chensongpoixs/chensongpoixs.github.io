<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 150" width="100%" height="100%">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,255,255,0.12);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(0,128,255,0.08);stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(0,255,255,0.3);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(0,255,255,0.8);stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Box 1: 数据 -->
  <rect x="10" y="30" width="150" height="70" rx="10" fill="url(#boxGrad)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="85" y="60" text-anchor="middle" fill="#00ffff" font-size="16" font-family="system-ui,sans-serif" font-weight="bold">数 据</text>
  <text x="85" y="82" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">Data</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="65" x2="195" y2="65" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="195,60 208,65 195,70" fill="#00ffff" opacity="0.8"/>

  <!-- Box 2: 知识蒸馏 -->
  <rect x="215" y="30" width="150" height="70" rx="10" fill="url(#boxGrad)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="290" y="60" text-anchor="middle" fill="#00ffff" font-size="16" font-family="system-ui,sans-serif" font-weight="bold">知识蒸馏</text>
  <text x="290" y="82" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">Distill</text>

  <!-- Arrow 2→3 -->
  <line x1="365" y1="65" x2="400" y2="65" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="400,60 413,65 400,70" fill="#00ffff" opacity="0.8"/>

  <!-- Box 3: 领域模型 -->
  <rect x="420" y="30" width="150" height="70" rx="10" fill="url(#boxGrad)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="495" y="60" text-anchor="middle" fill="#00ffff" font-size="16" font-family="system-ui,sans-serif" font-weight="bold">领域模型</text>
  <text x="495" y="82" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">Domain Model</text>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="65" x2="605" y2="65" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="605,60 618,65 605,70" fill="#00ffff" opacity="0.8"/>

  <!-- Box 4: Agent -->
  <rect x="625" y="30" width="150" height="70" rx="10" fill="url(#boxGrad)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="700" y="60" text-anchor="middle" fill="#00ffff" font-size="16" font-family="system-ui,sans-serif" font-weight="bold">Agent</text>
  <text x="700" y="82" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">Orchestration</text>

  <!-- Arrow 4→5 -->
  <line x1="775" y1="65" x2="810" y2="65" stroke="url(#arrowGrad)" stroke-width="2"/>
  <polygon points="810,60 823,65 810,70" fill="#00ffff" opacity="0.8"/>

  <!-- Box 5: 部署与推理优化 -->
  <rect x="830" y="30" width="120" height="70" rx="10" fill="url(#boxGrad)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="890" y="55" text-anchor="middle" fill="#00ffff" font-size="13" font-family="system-ui,sans-serif" font-weight="bold">部署 &amp;</text>
  <text x="890" y="73" text-anchor="middle" fill="#00ffff" font-size="13" font-family="system-ui,sans-serif" font-weight="bold">推理优化</text>
  <text x="890" y="92" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="system-ui,sans-serif">Deploy</text>

  <!-- Bottom label -->
  <text x="480" y="140" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="system-ui,sans-serif">AI 技术闭环</text>
</svg>
