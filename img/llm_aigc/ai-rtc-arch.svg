<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 350" width="100%" height="100%">
  <defs>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,255,255,0.12);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(0,128,255,0.08);stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Box 1: ASR -->
  <rect x="80" y="15" width="200" height="60" rx="10" fill="url(#boxGrad3)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="180" y="42" text-anchor="middle" fill="#00ffff" font-size="17" font-family="system-ui,sans-serif" font-weight="bold">ASR</text>
  <text x="180" y="62" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">语音识别</text>

  <!-- Plus 1 -->
  <text x="180" y="100" text-anchor="middle" fill="rgba(0,255,255,0.5)" font-size="24" font-family="system-ui,sans-serif">+</text>

  <!-- Box 2: LLM -->
  <rect x="80" y="110" width="200" height="60" rx="10" fill="url(#boxGrad3)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="180" y="137" text-anchor="middle" fill="#00ffff" font-size="17" font-family="system-ui,sans-serif" font-weight="bold">LLM</text>
  <text x="180" y="157" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">大语言模型</text>

  <!-- Plus 2 -->
  <text x="180" y="195" text-anchor="middle" fill="rgba(0,255,255,0.5)" font-size="24" font-family="system-ui,sans-serif">+</text>

  <!-- Box 3: TTS -->
  <rect x="80" y="205" width="200" height="60" rx="10" fill="url(#boxGrad3)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="180" y="232" text-anchor="middle" fill="#00ffff" font-size="17" font-family="system-ui,sans-serif" font-weight="bold">TTS</text>
  <text x="180" y="252" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui,sans-serif">语音合成</text>

  <!-- Plus 3 -->
  <text x="180" y="290" text-anchor="middle" fill="rgba(0,255,255,0.5)" font-size="24" font-family="system-ui,sans-serif">+</text>

  <!-- Box 4: WebRTC -->
  <rect x="80" y="300" width="200" height="35" rx="8" fill="rgba(0,255,255,0.06)" stroke="rgba(0,255,255,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="180" y="322" text-anchor="middle" fill="rgba(0,255,255,0.6)" font-size="14" font-family="system-ui,sans-serif" font-weight="bold">WebRTC 实时传输</text>
</svg>
