<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" width="100%" height="100%">
  <defs>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,255,255,0.12);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(0,128,255,0.08);stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#00ffff" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Box 1: 感知 -->
  <rect x="85" y="20" width="150" height="70" rx="10" fill="url(#boxGrad2)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="160" y="50" text-anchor="middle" fill="#00ffff" font-size="18" font-family="system-ui,sans-serif" font-weight="bold">感 知</text>
  <text x="160" y="72" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="system-ui,sans-serif">Perception</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="90" x2="160" y2="130" stroke="#00ffff" stroke-width="2" opacity="0.7" marker-end="url(#arrowDown)"/>

  <!-- Box 2: 思考 -->
  <rect x="85" y="140" width="150" height="70" rx="10" fill="url(#boxGrad2)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="160" y="170" text-anchor="middle" fill="#00ffff" font-size="18" font-family="system-ui,sans-serif" font-weight="bold">思 考</text>
  <text x="160" y="192" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="system-ui,sans-serif">Reasoning</text>

  <!-- Arrow 2→3 -->
  <line x1="160" y1="210" x2="160" y2="250" stroke="#00ffff" stroke-width="2" opacity="0.7" marker-end="url(#arrowDown)"/>

  <!-- Box 3: 行动 -->
  <rect x="85" y="260" width="150" height="70" rx="10" fill="url(#boxGrad2)" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
  <text x="160" y="290" text-anchor="middle" fill="#00ffff" font-size="18" font-family="system-ui,sans-serif" font-weight="bold">行 动</text>
  <text x="160" y="312" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="system-ui,sans-serif">Action</text>

  <!-- Return arrow (right side loop back) -->
  <path d="M 235 295 Q 290 295 290 195 Q 290 55 235 55" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <!-- Small arrowhead at the return -->
  <polygon points="235,50 242,55 235,60" fill="#00ffff" opacity="0.6"/>

  <!-- Loop label -->
  <text x="300" y="195" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="system-ui,sans-serif" transform="rotate(90,300,195)">闭环</text>

  <!-- Bottom label -->
  <text x="160" y="365" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="system-ui,sans-serif">Agent 感知-思考-行动闭环</text>
</svg>
